<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kočičí Věštírna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF4D94 0%, #FF6BB6 50%, #FF85CC 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 60px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            max-width: 650px;
            text-align: center;
        }

        h1 {
            color: #2C3E50;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        .subtitle {
            color: #FF4D94;
            font-size: 1.1em;
            margin-bottom: 40px;
            font-style: italic;
        }

        .cat-section {
            margin: 40px 0;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cat-image {
            width: 280px;
            max-width: 100%;
            height: auto;
            border-radius: 30px;
            filter: drop-shadow(0 10px 25px rgba(100, 50, 150, 0.15));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        @keyframes tailWag {
            0%, 100% { transform: rotate(-12deg); transform-origin: 50% 0%; }
            50% { transform: rotate(15deg); transform-origin: 50% 0%; }
        }

        .cat-body {
            animation: bounce 2s ease-in-out infinite;
        }

        .cat-tail {
            animation: tailWag 1.2s ease-in-out infinite;
        }

        .fortune-display {
            background: linear-gradient(135deg, #FFF5FB 0%, #F5E6FF 100%);
            border: 3px solid #E8B4E8;
            border-radius: 25px;
            padding: 35px;
            margin: 30px 0;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fortune-text {
            color: #2C3E50;
            font-size: 1.25em;
            line-height: 1.6;
            font-weight: 500;
            font-style: italic;
        }

        .fortune-text.loading {
            opacity: 0.5;
            color: #9B59B6;
        }

        .button-wrapper {
            margin: 40px 0;
        }

        button {
            background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.15em;
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(155, 89, 182, 0.4);
            background: linear-gradient(135deg, #8E44AD 0%, #7D3C98 100%);
        }

        button:active {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 40px;
            color: #95A5A6;
            font-size: 0.95em;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fortune-text {
            animation: fadeIn 0.5s ease-in;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>🔮 Kočičí Věštírna 🔮</h1>
        <p class="subtitle">Tajná moudrost kočky čeká na tebe...</p>

        <div class="cat-section">
            <img src="kockaa.png" alt="Kočka" class="cat-image">
        </div>

        <div class="fortune-display">
            <div class="fortune-text" id="fortune">
                Klikni na tlačítko a nechej věštit...
            </div>
        </div>

        <div class="button-wrapper">
            <button onclick="getFortuneFromCat()" id="fortuneBtn">Věštět Mě! 🔮</button>
        </div>

        <div class="footer">
            <p>💜 © 2026 Kočičí Věštírna | Věštba každé kočky je jedinečná 💜</p>
        </div>
    </div>

    <script>
        const fortunes = [
            "Mňau! Vidím v křišťálové kouli... že dneska budeš hodně líný. To je věstba! 😸",
            "Prr prr! Hvězdy mluví: Dnes ti bude skvěle, pokud budeš spát na slunci. Věř v to! ☀️",
            "Mňau mňau! Kočičí věštci vidí: V příštím týdnu si dáš něco chutného. Rybu! 🐟",
            "Frrr! Moje magická kočičí oko vidí: Budoucnost je jasná - bude to... kulatý den! 🌙",
            "Myáu! Podívám se do tví duše a vidím: Měl bys koupit kočku. Já jsem ta správná! 😻",
            "Mrňau! Věští se mi, že něco velkého tě čeká. Pravděpodobně moje tlapka na tvé tváři! 🐾",
            "Chrup! Věštba říká: Zítra bude den, kdy se nebudeš muset ničeho bát. Jen piš vodu! 💧",
            "Prr! Moje osmá barva vidí budoucnost: Setkáš se s někým důležitým... Se mnou! 🎉",
            "Mňau! Věštkyně kočka vám hlásí: Štěstí přijde v balíčku. Balíčku s pamlsky! 🎁",
            "Frrr frrr! Čtu ti z tvých očí: Jsi osoba, která zná hodnotu dobrého posezení. Správně! 😺",
            "Myáu myáu! Kočičí věstba: V lednu, únoru, březnu... vlastně celoročně budeš koukat na mě. 👀",
            "Mňau! Hvězdy mluví kočičím jazykem: Tvoje budoucnost je... vláčitá a měkká. Jako já! 🧡",
            "Prr! Magické oko kočky vidí: Něco tě v životě změní. Pravděpodobně adopce kočky! 😹",
            "Chrup chrup! Věšticí kočka věští: Měl bys si odpustit víc času na odpočinek. Slušej mě! 😴",
            "Frrr! Podle древних kočičích zákonů: Štěstí přijde k těm, co si dají zdravou snídani. Z ryb! 🍽️",
            "Mňau! Vidím v kouči budoucnosti: Budeš v pokoji... s kočkou. To je nejlepší věstba! 💕",
            "Myáu! Kočičí věda mluví: Máš přesně tolik štěstí, kolik má kočka životů. Tedy 9x! ✨",
            "Prr prr! Věstba z astrologických vln: Konec týdne bude pěkný, když si nekoupíš záclony. 🪟",
            "Mňau mňau! Věštkyně vidí: Tvoje osud je spojený s jedním zvířetem - mnou! Kočkou! 🐱",
            "Frrr! Poslední věstba dne: Zítra vstaneš, pak si dáš snídani, pak si lehnešš. Perfekt! 😻"
        ];

        const catSounds = ["Mňau!", "Prr!", "Myáu!", "Mrrr!", "Frrr!", "Chrup!"];

        function getFortuneFromCat() {
            const button = document.getElementById('fortuneBtn');
            const fortuneDiv = document.getElementById('fortune');
            
            // Disable button
            button.disabled = true;
            
            // Add loading effect
            fortuneDiv.classList.add('loading');
            fortuneDiv.textContent = 'Kočka věští...';
            
            // Simulate thinking time
            setTimeout(() => {
                // Get random fortune and sound
                const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
                const randomSound = catSounds[Math.floor(Math.random() * catSounds.length)];
                
                // Display result
                fortuneDiv.classList.remove('loading');
                fortuneDiv.textContent = randomSound + ' ' + randomFortune;
                
                // Enable button
                button.disabled = false;
            }, 1000);
        }

        // Allow keyboard activation
        document.getElementById('fortuneBtn').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getFortuneFromCat();
            }
        });
    </script>
</body>
</html>
